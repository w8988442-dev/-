<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>用户中心</title>
<script src="core.js"></script>
</head>
<body>

<div id="login">
<input id="phone" placeholder="手机号">
<input id="pwd" type="password" placeholder="密码">
<button onclick="login()">登录</button>
</div>

<div id="panel" style="display:none">
<h3 id="info"></h3>
<button onclick="changePwd()">修改密码</button>
<button onclick="viewMsg()">查看消息</button>
</div>

<script>
let current;

function login(){
  let u=getUser(phone.value);
  if(!u || u.password!==pwd.value)return alert("失败");

  current=u;

  if(u.reset){
    alert("密码已被重置，请修改");
    u.reset=false;
    saveDB();
  }

  login.style.display="none";
  panel.style.display="block";
  info.innerText="积分："+u.points;
}

function changePwd(){
  let old=prompt("旧密码");
  if(old!==current.password)return alert("错误");

  let np=prompt("新密码");
  current.password=np;
  saveDB();
  alert("成功");
}

function viewMsg(){
  let list=DB.msgs.filter(x=>x.phone===current.phone);
  console.log(list);
  alert("控制台查看");
}
</script>

</body>
</html>
