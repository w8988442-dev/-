<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>系统入口</title>
<script src="core.js"></script>
</head>
<body>

<h3>系统验证</h3>

<div id="step1">
<input id="pwd1" placeholder="访问密码">
<button onclick="go1()">进入</button>
</div>

<div id="step2" style="display:none">
<input id="user" placeholder="账号">
<input id="pwd2" type="password" placeholder="密码">
<button onclick="go2()">登录</button>
</div>

<div id="panel" style="display:none">
<h3>管理面板</h3>

<input id="phone" placeholder="手机号">
<button onclick="createUser()">创建用户</button>

<br><br>

<input id="points" placeholder="积分">
<button onclick="addPts()">加积分</button>

<br><br>

<button onclick="resetPwd()">重置密码</button>

<br><br>

<button onclick="viewLogs()">查看日志</button>

</div>

<script>
function go1(){
  let r=checkAccess(pwd1.value);
  if(r==="OK"){
    step1.style.display="none";
    step2.style.display="block";
  }else if(r==="LOCK"){
    alert("已锁10分钟");
  }else alert("错误");
}

function go2(){
  if(user.value==="amdi000" && pwd2.value==="A39028@"){
    step2.style.display="none";
    panel.style.display="block";
  }else alert("错误");
}

function createUser(){
  if(addUser(phone.value))alert("已创建");
  else alert("已存在");
}

function addPts(){
  addPoints(phone.value,parseInt(points.value));
  alert("完成");
}

function resetPwd(){
  if(!confirm("确认重置？"))return;
  resetPassword(phone.value);
  alert("已重置");
}

function viewLogs(){
  console.log(DB.logs);
  alert("控制台查看");
}
</script>

</body>
</html>
