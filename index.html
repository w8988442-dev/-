<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>积分查询</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC',sans-serif;background:#0F1117;color:#E2E8F0;min-height:100vh}
.page{display:none;max-width:420px;margin:0 auto;padding:24px 16px;min-height:100vh}
.page.show{display:block}
.logo{text-align:center;margin-bottom:32px;padding-top:40px}
.logo-icon{font-size:48px;margin-bottom:12px}
.logo-title{font-size:22px;font-weight:900}
.logo-sub{font-size:13px;color:#6B7280;margin-top:4px}
.card{background:#161B27;border:1px solid #1E293B;border-radius:16px;padding:24px;margin-bottom:16px}
.form-label{font-size:12px;color:#9CA3AF;display:block;margin-bottom:6px}
.form-input{width:100%;background:#0F1117;border:1px solid #1E293B;border-radius:8px;padding:11px 14px;color:#E2E8F0;font-size:14px;outline:none;margin-bottom:14px}
.form-input:focus{border-color:#6366F1}
.btn{width:100%;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px}
.btn-primary{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff}
.btn-secondary{background:#1E293B;color:#9CA3AF}
.btn-green{background:linear-gradient(135deg,#059669,#10B981);color:#fff}
.btn-red{background:#7F1D1D;color:#FCA5A5}
.err{color:#F87171;font-size:12px;text-align:center;margin-bottom:10px;min-height:18px}
.notif{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 20px;border-radius:10px;font-weight:600;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.5);max-width:320px;text-align:center}
.notif.success{background:#064E3B;border:1px solid #10B981;color:#6EE7B7}
.notif.error{background:#7F1D1D;border:1px solid #EF4444;color:#FCA5A5}
.notif.info{background:#1E1B4B;border:1px solid #6366F1;color:#A5B4FC}
.header{background:linear-gradient(135deg,#1A1F2E,#16213E);border-bottom:1px solid #1E293B;padding:0 16px;position:sticky;top:0;z-index:100}
.header-inner{max-width:420px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.pts-big{font-size:52px;font-weight:900;color:#6366F1;text-align:center;margin:8px 0}
.level-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
.msg-item{padding:12px;border-bottom:1px solid #1E293B;font-size:13px}
.msg-item.unread{background:#1B1F3A}
.msg-time{font-size:11px;color:#6B7280;margin-top:4px}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #1E293B}
.tabs{display:flex;gap:4px}
.tab{padding:6px 12px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:#9CA3AF}
.tab.active{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff}
.alert-banner{background:#1B1F3A;border:1px solid #6366F1;border-radius:10px;padding:12px;margin-bottom:14px;font-size:13px;color:#A5B4FC;display:flex;align-items:center;gap:10px}
</style>
</head>
<body>

<!-- 登录页 -->
<div class="page show" id="pg-login">
  <div class="logo">
    <div class="logo-icon">🎰</div>
    <div class="logo-title">积分查询中心</div>
    <div class="logo-sub">请登录查看您的积分</div>
  </div>
  <div class="card">
    <label class="form-label">手机号码</label>
    <input class="form-input" id="l-phone" placeholder="请输入手机号" type="tel" />
    <label class="form-label">密码</label>
    <input class="form-input" id="l-pass" placeholder="初始密码：abc12345" type="password" />
    <div class="err" id="l-err"></div>
    <button class="btn btn-primary" onclick="doLogin()">登 录</button>
  </div>
</div>

<!-- 主页 -->
<div class="page" id="pg-main">
  <div class="header">
    <div class="header-inner">
      <div style="font-weight:900;font-size:15px">🎰 我的积分</div>
      <div class="tabs">
        <button class="tab active" onclick="switchUserTab('home')" id="ut-home">首页</button>
        <button class="tab" onclick="switchUserTab('history')" id="ut-history">记录</button>
        <button class="tab" onclick="switchUserTab('msgs')" id="ut-msgs">消息<span id="unread-dot"></span></button>
        <button class="tab" onclick="switchUserTab('settings')" id="ut-settings">设置</button>
      </div>
    </div>
  </div>

  <!-- 首页 -->
  <div style="max-width:420px;margin:0 auto;padding:16px" id="ut-home-content">
    <div id="reset-alert" class="alert-banner" style="display:none">
      ⚠️ <span>您的密码已被管理员重置，请修改密码后继续使用。</span>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:13px;color:#6B7280;margin-bottom:4px">您好，<span id="u-name"></span></div>
      <div class="pts-big" id="u-pts">0</div>
      <div style="font-size:12px;color:#6B7280">积分</div>
      <div style="margin-top:10px"><span class="level-badge" id="u-level"></span></div>
    </div>
    <div class="card">
      <div style="font-weight:700;font-size:14px;margin-bottom:12px">🎁 可兑换奖品</div>
      <div id="u-rewards"></div>
    </div>
  </div>

  <!-- 记录 -->
  <div style="max-width:420px;margin:0 auto;padding:16px;display:none" id="ut-history-content">
    <div class="card">
      <div style="font-weight:700;font-size:14px;margin-bottom:12px">📋 积分记录</div>
      <div id="u-history"></div>
    </div>
  </div>

  <!-- 消息 -->
  <div style="max-width:420px;margin:0 auto;padding:16px;display:none" id="ut-msgs-content">
    <div class="card">
      <div style="font-weight:700;font-size:14px;margin-bottom:12px">📬 我的消息</div>
      <div id="u-msgs"></div>
    </div>
  </div>

  <!-- 设置 -->
  <div style="max-width:420px;margin:0 auto;padding:16px;display:none" id="ut-settings-content">
    <div class="card">
      <div style="font-weight:700;font-size:14px;margin-bottom:16px">🔒 修改密码</div>
      <label class="form-label">当前密码</label>
      <input class="form-input" id="cp-old" type="password" placeholder="请输入当前密码" />
      <label class="form-label">新密码</label>
      <input class="form-input" id="cp-new" type="password" placeholder="请输入新密码（至少6位）" />
      <label class="form-label">确认新密码</label>
      <input class="form-input" id="cp-confirm" type="password" placeholder="再次输入新密码" />
      <div class="err" id="cp-err"></div>
      <button class="btn btn-primary" onclick="changePassword()">修改密码</button>
    </div>
    <button class="btn btn-secondary" onclick="doLogout()">退出登录</button>
  </div>
</div>

<div id="notif" class="notif" style="display:none"></div>

<script>
var _ss=localStorage,_cu=null;
function _gd(k){try{return JSON.parse(_ss.getItem(k))||null}catch(e){return null}}
function _sd(k,v){_ss.setItem(k,JSON.stringify(v))}

function showNotif(m,t){
  var el=document.getElementById('notif');
  el.textContent=m;el.className='notif '+t;el.style.display='block';
  setTimeout(function(){el.style.display='none'},3000);
}

function getLevel(p){
  if(p>=1000)return{label:'钻石会员',color:'#60A5FA',bg:'#1E3A5F'};
  if(p>=500)return{label:'黄金会员',color:'#FBBF24',bg:'#2D1F00'};
  if(p>=200)return{label:'白银会员',color:'#9CA3AF',bg:'#1F2937'};
  return{label:'普通会员',color:'#6EE7B7',bg:'#022C22'};
}

function doLogin(){
  var phone=document.getElementById('l-phone').value.trim();
  var pass=document.getElementById('l-pass').value.trim();
  document.getElementById('l-err').textContent='';
  if(!phone||!pass){document.getElementById('l-err').textContent='请输入手机号和密码';return;}
  var customers=_gd('customers')||[];
  var user=null;
  for(var i=0;i<customers.length;i++){
    if(customers[i].phone===phone){user=customers[i];break;}
  }
  if(!user){document.getElementById('l-err').textContent='该手机号未注册，请联系管理员';return;}
  var upwd=_gd('upwd_'+phone)||'abc12345';
  if(pass!==upwd){document.getElementById('l-err').textContent='密码错误';return;}
  _cu=phone;
  showPage('pg-main');
  renderUserHome();
  showNotif('登录成功！','success');
}

function doLogout(){
  _cu=null;showPage('pg-login');
  document.getElementById('l-pass').value='';
}

function showPage(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('show');});
  document.getElementById(id).classList.add('show');
}

function switchUserTab(t){
  ['home','history','msgs','settings'].forEach(function(id){
    document.getElementById('ut-'+id+'-content').style.display=id===t?'':'none';
    var btn=document.getElementById('ut-'+id);
    btn.className='tab'+(id===t?' active':'');
  });
  if(t==='home')renderUserHome();
  if(t==='history')renderUserHistory();
  if(t==='msgs')renderUserMsgs();
}

function getMyData(){
  var customers=_gd('customers')||[];
  for(var i=0;i<customers.length;i++){if(customers[i].phone===_cu)return customers[i];}
  return null;
}

function renderUserHome(){
  var c=getMyData();if(!c)return;
  var lvl=getLevel(c.points);
  document.getElementById('u-name').textContent=c.name;
  document.getElementById('u-pts').textContent=c.points.toLocaleString();
  var lb=document.getElementById('u-level');
  lb.textContent=lvl.label;lb.style.color=lvl.color;lb.style.background=lvl.bg;lb.style.padding='4px 14px';lb.style.borderRadius='20px';

  var resetFlag=_gd('reset_flag_'+_cu);
  document.getElementById('reset-alert').style.display=resetFlag?'flex':'none';

  var rewards=_gd('rewards')||[];
  var html='';
  if(rewards.length===0){html='<div style="color:#6B7280;font-size:13px;text-align:center;padding:12px">暂无可兑换奖品</div>';}
  else{rewards.forEach(function(r){
    var can=c.points>=r.points;
    html+='<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #1E293B;opacity:'+(can?1:.4)+'">';
    html+='<span style="font-size:22px">'+r.icon+'</span>';
    html+='<div style="flex:1"><div style="font-weight:700;font-size:13px">'+r.name+'</div><div style="font-size:11px;color:#6B7280">库存 '+r.stock+' 件</div></div>';
    html+='<div style="font-weight:700;color:'+(can?'#10B981':'#4B5563')+';font-size:13px">'+r.points+' 积分</div>';
    html+='</div>';
  });}
  document.getElementById('u-rewards').innerHTML=html;

  var msgs=_gd('msgs_'+_cu)||[];
  var unread=msgs.filter(function(m){return!m.read;}).length;
  document.getElementById('unread-dot').textContent=unread>0?' ('+unread+')':'';
}

function renderUserHistory(){
  var c=getMyData();if(!c)return;
  var html='';
  if(!c.history||c.history.length===0){html='<div style="color:#6B7280;font-size:13px;text-align:center;padding:12px">暂无记录</div>';}
  else{c.history.forEach(function(h){
    html+='<div class="hist-item">';
    html+='<span style="font-size:18px">'+(h.pts>0?'🎯':'🎁')+'</span>';
    html+='<div style="flex:1"><div style="font-weight:600;font-size:13px">'+h.prize+'</div><div style="font-size:11px;color:#6B7280">'+h.date+'</div></div>';
    html+='<div style="font-weight:700;color:'+(h.pts>0?'#34D399':'#F87171')+';">'+(h.pts>0?'+':'')+h.pts+'</div>';
    html+='</div>';
  });}
  document.getElementById('u-history').innerHTML=html;
}

function renderUserMsgs(){
  var msgs=_gd('msgs_'+_cu)||[];
  var html='';
  if(msgs.length===0){html='<div style="color:#6B7280;font-size:13px;text-align:center;padding:12px">暂无消息</div>';}
  else{
    var updated=false;
    msgs.forEach(function(m){
      html+='<div class="msg-item'+(m.read?'':' unread')+'">';
      html+='<div>'+m.content+'</div>';
      html+='<div class="msg-time">'+m.time+'</div></div>';
      if(!m.read){m.read=true;updated=true;}
    });
    if(updated){_sd('msgs_'+_cu,msgs);}
  }
  document.getElementById('u-msgs').innerHTML=html;
  document.getElementById('unread-dot').textContent='';
}

function changePassword(){
  var old=document.getElementById('cp-old').value.trim();
  var nw=document.getElementById('cp-new').value.trim();
  var cf=document.getElementById('cp-confirm').value.trim();
  document.getElementById('cp-err').textContent='';
  var upwd=_gd('upwd_'+_cu)||'abc12345';
  if(old!==upwd){document.getElementById('cp-err').textContent='当前密码错误';return;}
  if(nw.length<6){document.getElementById('cp-err').textContent='新密码至少6位';return;}
  if(nw!==cf){document.getElementById('cp-err').textContent='两次密码不一致';return;}
  _sd('upwd_'+_cu,nw);
  _sd('reset_flag_'+_cu,false);
  document.getElementById('reset-alert').style.display='none';
  document.getElementById('cp-old').value='';
  document.getElementById('cp-new').value='';
  document.getElementById('cp-confirm').value='';

  var logs=_gd('logs')||[];
  logs.unshift({time:new Date().toLocaleString('zh-CN'),action:'用户修改密码',phone:_cu,by:'用户本人'});
  _sd('logs',logs);

  showNotif('密码修改成功！','success');
}
</script>
</body>
</html>
